<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="800" height="450"/>
  
  <!-- Code brackets icon -->
  <g transform="translate(400, 200)" opacity="0.3">
    <polyline points="-40,-50 -70,-20 -40,10" fill="none" stroke="#4a9eff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="40,-50 70,-20 40,10" fill="none" stroke="#4a9eff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-15" y1="40" x2="15" y2="-40" stroke="#4a9eff" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
